name: Deploy to Deno Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DENO_PROJECT_NAME: ${{ vars.DENO_PROJECT || secrets.DENO_PROJECT }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://alexmollard.dev' }}
        run: npm run build

      - name: Validate Deno project setting
        run: |
          if [ -z "${DENO_PROJECT_NAME}" ]; then
            echo "Missing Deno project name. Set repository variable DENO_PROJECT (or secret DENO_PROJECT)."
            exit 1
          fi

      - name: Upload to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: ${{ env.DENO_PROJECT_NAME }}
          entrypoint: jsr:@std/http/file-server
          root: dist